<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoLab | Ofertas Especiales</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root { --primary-color: #0d6efd; --dark-bg: #121212; --light-bg: #f8f9fa; --text-dark: #333333; --text-light: #ffffff; --danger: #dc3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light-bg); color: var(--text-dark); }
        header { background-color: var(--dark-bg); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--text-light); font-size: 1.5rem; font-weight: 700; text-decoration: none; }
        .logo span { color: var(--primary-color); }
        nav ul { list-style: none; display: flex; gap: 1.5rem; }
        nav a { color: var(--text-light); text-decoration: none; transition: color 0.3s; }
        nav a:hover { color: var(--primary-color); }
        .btn-carrito { background-color: var(--primary-color); color: white; padding: 0.5rem 1rem; border-radius: 5px; text-decoration: none; font-weight: 600; }
        
        .container { padding: 3rem 5%; }
        .grid-ofertas { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .oferta-card { background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .badge-descuento { position: absolute; top: 10px; left: 10px; background: var(--danger); color: white; padding: 0.3rem 0.6rem; font-size: 0.8rem; font-weight: bold; border-radius: 3px; }
        .precio-antes { text-decoration: line-through; color: #888; font-size: 0.9rem; }
        .precio-ahora { font-size: 1.6rem; font-weight: 700; color: var(--danger); margin-bottom: 1rem; }
        .btn-comprar { background-color: var(--dark-bg); color: white; border: none; padding: 0.8rem 1.5rem; width: 100%; border-radius: 5px; font-weight: 600; cursor: pointer; }
        .btn-comprar:hover { background-color: var(--primary-color); }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Tecno<span>Lab</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="computadoras.html">Computadoras</a></li>
                <li><a href="software.html">Software</a></li>
                <li><a href="licencias.html">Licencias</a></li>
                <li><a href="ofertas.html">Ofertas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrito.html" class="btn-carrito">🛒 Carrito (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 style="text-align:center; margin-bottom: 2rem;">Descuentos Exclusivos</h1>
        <div class="grid-ofertas">
            <div class="oferta-card">
                <span class="badge-descuento">25% OFF</span>
                <h3>Antivirus Norton 360</h3>
                <p style="color:#666; margin: 0.5rem 0;">Licencia Anual - 1 Usuario</p>
                <p class="precio-antes">$599 MXN</p>
                <p class="precio-now">$449 MXN</p>
                <button class="btn-comprar" onclick="agregarAlCarrito('Norton 360 (Oferta)', 449)">Añadir al carrito</button>
            </div>
        </div>
    </main>

    <script>
        let carrito = JSON.parse(localStorage.getItem('tecnolab_carrito')) || [];
        function actualizarContador() { document.getElementById('cart-count').innerText = carrito.length; }
        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio });
            localStorage.setItem('tecnolab_carrito', JSON.stringify(carrito));
            actualizarContador();
            alert('¡Producto en oferta añadido!');
        }
        document.addEventListener('DOMContentLoaded', actualizarContador);
    </script>
</body>
</html>
